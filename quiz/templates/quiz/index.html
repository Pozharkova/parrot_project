{% extends 'quiz/base.html' %}
{% block title %}Home - Parrot Quiz{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <h1>Викторина про попугаев</h1>
        <p>Проверка знаний о попугаях. За каждый правильный ответ дается 1 балл. Один неправильный ответ - игра заканчивается.</p>
        <form method="post" action="{% url 'quiz:start' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Начать</button>
        </form>
    </div>
    <div class="col-md-6">
        <img src="{{ image_url }}" class="img-fluid rounded" alt="Random parrot">
    </div>
</div>
{% endblock %}
