{% extends 'quiz/base.html' %}
{% block title %}Quiz Result{% endblock %}
{% block content %}
<div class="card text-center">
    <div class="card-header">
        Конец игры
    </div>
    <div class="card-body">
        <h5 class="card-title">{{ player_name }}, Результат: {{ score }}</h5>
        <a href="{% url 'quiz:index' %}" class="btn btn-primary">Попробовать снова</a>
        <a href="{% url 'quiz:leaderboard' %}" class="btn btn-secondary">Посмотреть лидеров</a>
    </div>
</div>
{% endblock %}
