{% extends 'quiz/base.html' %}
{% block title %}Species Form{% endblock %}
{% block content %}
<h2>{% if form.instance.pk %}Редактировать{% else %}Добавить{% endif %} вид</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'quiz:species_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
